// ============= IndexedDB - pamięć aplikacji =============
const DB_NAME = 'showroom_quote_app';
const DB_VERSION = 1;
const STORE = 'data';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

    setDiscount(0);
    setClientName('');
    setClientPhone('');
    setClientEmail('');
    setOrderNotes('');
    setOrderPhotos([]);
    setCurrentQuoteId(null);
    setCurrentStatus('UTWORZONA');
    if (generateNewNumber) {
      setQuoteNumber(generateQuoteNumber());
    }
  };

  const startNewQuote = () => {
    if (positions.length > 0 && !currentQuoteId) {
      const confirmed = confirm(
        `Masz ${positions.length} pozycji w aktualnej wycenie, która nie została zapisana.\n\n` +
        `OK = Zapisz w historii i rozpocznij nową\nAnuluj = Rozpocznij nową bez zapisywania (wycena zostanie utracona)`
      );
      if (confirmed) {
        saveCurrentQuote(true);
      }
    } else if (positions.length > 0 && currentQuoteId) {
      // Edytowaliśmy zapisaną — zaproponuj aktualizację
      const confirmed = confirm(
        `Edytujesz zapisaną wycenę nr ${quoteNumber}.\n\n` +
        `OK = Zaktualizuj w historii i rozpocznij nową\nAnuluj = Rozpocznij nową bez aktualizacji`
      );
      if (confirmed) {
        saveCurrentQuote(true);
      }
    }
    resetCurrentQuote(true);
  };

  const loadQuoteFromHistory = (quote) => {
    // Najpierw sprawdź czy aktualna wycena nie powinna być zapisana
    if (positions.length > 0 && !currentQuoteId) {
      const confirmed = confirm(
        `Masz aktualnie ${positions.length} niezapisanych pozycji.\n\n` +
        `OK = Zapisz aktualną i wczytaj wybraną\nAnuluj = Wczytaj wybraną BEZ zapisywania aktualnej`
      );
      if (confirmed) {
        saveCurrentQuote(true);
      }
    }

    // Przełącz kategorię jeśli inna
    if (quote.category !== activeCategory) {
      setActiveCategory(quote.category);
      setTimeout(() => {
        setQuoteNumber(quote.quoteNumber);
        setCurrentQuoteId(quote.id);
        setCurrentStatus(quote.status || 'UTWORZONA');
        setPositions(quote.positions);
        setDiscount(quote.discount || 0);
        setClientName(quote.clientName || '');
        setClientPhone(quote.clientPhone || '');
        setClientEmail(quote.clientEmail || '');
        setOrderNotes(quote.orderNotes || '');
        setOrderPhotos(quote.orderPhotos || []);
      }, 100);
    } else {
      setQuoteNumber(quote.quoteNumber);
      setCurrentQuoteId(quote.id);
      setCurrentStatus(quote.status || 'UTWORZONA');
      setPositions(quote.positions);
      setDiscount(quote.discount || 0);
      setClientName(quote.clientName || '');
      setClientPhone(quote.clientPhone || '');
      setClientEmail(quote.clientEmail || '');
      setOrderNotes(quote.orderNotes || '');
      setOrderPhotos(quote.orderPhotos || []);
    }
    setHistoryPanelOpen(false);
  };

  const deleteQuoteFromHistory = (id) => {
    if (!confirm('Czy na pewno chcesz usunąć tę wycenę z historii?')) return;
    setSavedQuotes(savedQuotes.filter(q => q.id !== id));
    // Jeśli usuwamy aktualnie edytowaną, oznacz jako nową
    if (currentQuoteId === id) {
      setCurrentQuoteId(null);
    }
  };

  // Zmiana statusu wyceny w historii (bez wczytywania całej)
  const changeQuoteStatus = (id, newStatus) => {
    setSavedQuotes(prev => prev.map(q => q.id === id ? { ...q, status: newStatus } : q));
    // Jeśli edytujemy tę wycenę, zaktualizuj też aktualny status
    if (currentQuoteId === id) {
      setCurrentStatus(newStatus);
    }
  };

  // Eksport historii wycen do Excela
  const exportHistoryToExcel = () => {
    if (savedQuotes.length === 0) {
      alert('Brak wycen do eksportu.');
      return;
    }
    // Arkusz 1: Lista wycen (jeden wiersz = jedna wycena)
    const summaryRows = savedQuotes.map(q => {
      const d = new Date(q.savedAt);
      return {
        'Numer': q.quoteNumber || '',
        'Data zapisu': d.toLocaleString('pl-PL'),
        'Status': q.status || 'UTWORZONA',
        'Kategoria': q.categoryLabel || '',
        'Klient': q.clientName || '',
        'Telefon': q.clientPhone || '',
        'E-mail': q.clientEmail || '',
        'Przyjął': q.createdBy || '',
        'Liczba pozycji': q.positions?.length || 0,
        'Suma częściowa': q.subtotal || 0,
        'Rabat %': q.discount || 0,
        'Do zapłaty': q.total || 0,
        'Waluta': q.currency || '',
        'Uwagi': q.orderNotes || '',
      };
    });

    // Arkusz 2: Wszystkie pozycje (jeden wiersz = jedna pozycja)
    const positionsRows = [];
    savedQuotes.forEach(q => {
      (q.positions || []).forEach((p, idx) => {
        const f = p.fabric || {};
        const fabricParts = [f.supplier, f.collection, f.color].filter(Boolean);
        const fabricText = fabricParts.join(' / ');
        positionsRows.push({
          'Nr wyceny': q.quoteNumber || '',
          'Klient': q.clientName || '',
          'Status': q.status || 'UTWORZONA',
          'Kategoria': q.categoryLabel || '',
          'Lp.': idx + 1,
          'Kolekcja modułu': p.collection || '',
          'Element': p.elementName || '',
          'Grupa cenowa': p.group || '',
          'Dostawca tkaniny': f.supplier || '',
          'Kolekcja tkaniny': f.collection || '',
          'Kolor': f.color || '',
          'Tkanina (pełna)': fabricText,
          'Cena jedn.': p.price || 0,
          'Ilość': p.qty || 0,
          'Wartość': (p.price || 0) * (p.qty || 0),
          'Waluta': q.currency || '',
        });
      });
    });

    const wb = window.XLSX.utils.book_new();
    const ws1 = window.XLSX.utils.json_to_sheet(summaryRows);
    const ws2 = window.XLSX.utils.json_to_sheet(positionsRows);

    // Auto-szerokość kolumn
    const autoWidth = (rows) => {
      if (rows.length === 0) return [];
      return Object.keys(rows[0]).map(key => {
        const maxLen = Math.max(
          key.length,
          ...rows.map(r => String(r[key] || '').length)
        );
        return { wch: Math.min(maxLen + 2, 40) };
      });
    };
    ws1['!cols'] = autoWidth(summaryRows);
    ws2['!cols'] = autoWidth(positionsRows);

    window.XLSX.utils.book_append_sheet(wb, ws1, 'Wyceny');
    window.XLSX.utils.book_append_sheet(wb, ws2, 'Pozycje');

    const today = new Date().toISOString().slice(0, 10);
    window.XLSX.writeFile(wb, `Wyceny_Beatris_${today}.xlsx`);
  };

  // ZMIANA KATEGORII - pytaj o zapisanie wyceny
  const handleCategoryChange = (newCategoryId) => {
    if (newCategoryId === activeCategory) return;
    if (positions.length > 0) {
      const confirmed = confirm(
        `Masz ${positions.length} pozycji w aktualnej wycenie. Czy chcesz ją zapisać przed przełączeniem kategorii?\n\n` +
        `OK = Zapisz i przełącz\nAnuluj = Przełącz bez zapisywania (wycena zostanie utracona)`
      );
      if (confirmed) {
        saveCurrentQuote(true);
      }
    }
    // Pełny reset wyceny przy zmianie kategorii (status, klient, uwagi, zdjęcia, etc.)
    resetCurrentQuote(true);
    setActiveCategory(newCategoryId);
  };

  // Po zmianie aktywnej kategorii — wyczyść tylko pozycje (bez resetowania selectedCollectionName)
  useEffect(() => {
    if (isLoading) return;
    setPositions([]);
  }, [activeCategory, isLoading]);

  // Synchronizuj selectedCollectionName z aktywną kategorią - zawsze trzymaj pierwszą kolekcję jako wybraną,
  // dopóki użytkownik nie zmieni ręcznie
  useEffect(() => {
    if (isLoading) return;
    if (collections.length === 0) {
      setSelectedCollectionName('');
      return;
    }
    // Jeśli aktualnie wybrana kolekcja nie istnieje w aktywnej kategorii, ustaw pierwszą
    const exists = collections.some(c => c.name === selectedCollectionName);
    if (!exists) {
      setSelectedCollectionName(collections[0].name);
    }
  }, [collections, activeCategory, isLoading]);

  // Modal dodawania pozycji
  const [modalOpen, setModalOpen] = useState(false);
  const [modalElement, setModalElement] = useState('');
  const [modalGroup, setModalGroup] = useState('');

  // Panel diagnostyczny zdjęć
  const [imageDebugOpen, setImageDebugOpen] = useState(false);

  // Dane klienta + numer wyceny
  const [clientPanelOpen, setClientPanelOpen] = useState(false);
  const [clientName, setClientName] = useState('');
  const [clientPhone, setClientPhone] = useState('');
  const [clientEmail, setClientEmail] = useState('');

  // Uwagi do zamówienia + zdjęcia do zamówienia (np. tkaniny, próbniki)
  const [orderNotes, setOrderNotes] = useState('');
  const [orderPhotos, setOrderPhotos] = useState([]); // [{ id, dataUrl, label }]
  const orderPhotoInputRef = useRef(null);

  // Historia wycen
  const [savedQuotes, setSavedQuotes] = useState([]);
  const [historyPanelOpen, setHistoryPanelOpen] = useState(false);
  // ID aktualnie edytowanej wyceny w historii (null = nowa, nie zapisana jeszcze)
  const [currentQuoteId, setCurrentQuoteId] = useState(null);

  // Wyszukiwarka w historii (klient, numer, data, autor)

  // Numer aktualnej wyceny - generuje się po zalogowaniu, na podstawie historii
  const [quoteNumber, setQuoteNumber] = useState('—');

  const excelInputRef = useRef(null);
  const imagesInputRef = useRef(null);
  const imagesFolderInputRef = useRef(null);

  const selectedCollection = useMemo(
    () => collections.find(c => c.name === selectedCollectionName) || null,

  );

  // ---- WCZYTYWANIE EXCELA TKANIN ----
  // Format: kolumna 1 = Dostawca, kolumna 2 = Kolekcja
  // Bez wiersza nagłówka (jak na screenie)
  const handleFabricsUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = window.XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

        if (rows.length === 0) {
          alert('Plik z tkaninami jest pusty.');
          return;
        }

        const newFabrics = {};
        // Wczytujemy WSZYSTKIE wiersze (nie pomijamy nagłówka - na screenie nie ma nagłówka)
        // Ale jeśli pierwszy wiersz wygląda na nagłówek, pomijamy
        let startIdx = 0;
        const firstRow = rows[0];
        const first0 = String(firstRow[0] || '').trim().toLowerCase();
        const first1 = String(firstRow[1] || '').trim().toLowerCase();
        if (first0 === 'dostawca' || first0 === 'producent' || first1 === 'kolekcja' || first1 === 'tkanina') {
          startIdx = 1;
        }

        for (let i = startIdx; i < rows.length; i++) {
          const row = rows[i];
          const supplier = String(row[0] || '').trim();
          const collection = String(row[1] || '').trim();
          if (!supplier || !collection) continue;

          if (!newFabrics[supplier]) newFabrics[supplier] = [];
          if (!newFabrics[supplier].includes(collection)) {
            newFabrics[supplier].push(collection);
          }
        }

        // Sortuj kolekcje alfabetycznie
        Object.keys(newFabrics).forEach(s => newFabrics[s].sort());

        setFabrics(newFabrics);
        setFabricsFileName(file.name);

        const suppliers = Object.keys(newFabrics).length;
        let totalCollections = 0;
        Object.values(newFabrics).forEach(c => totalCollections += c.length);

        alert(`✅ Wczytano katalog tkanin:\n• ${suppliers} dostawców\n• ${totalCollections} kolekcji`);
      } catch (err) {
        alert('Błąd wczytywania pliku Excel z tkaninami: ' + err.message);
      }
    };
    reader.onerror = () => alert('Błąd wczytywania pliku.');
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  };

  // ---- WCZYTYWANIE EXCELA ----
  const handleExcelUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (evt) => {
      const data = new Uint8Array(evt.target.result);
      const workbook = window.XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = window.XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

      if (rows.length < 2) return;

      const headers = rows[0];
      const groups = headers.slice(2).map(h => String(h).trim()).filter(h => h !== '');

      const collectionsMap = {};
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const collectionName = String(row[0] || '').trim();
        const elementName = String(row[1] || '').trim();
        if (!collectionName || !elementName) continue;

        if (!collectionsMap[collectionName]) {
          collectionsMap[collectionName] = { name: collectionName, elements: [] };
        }
        const prices = {};
        groups.forEach((g, idx) => {
          const val = row[2 + idx];
          const num = parseFloat(String(val).replace(',', '.').replace(/[^\d.-]/g, ''));
          prices[g] = isNaN(num) ? 0 : num;
        });
        collectionsMap[collectionName].elements.push({ name: elementName, prices });
      }
      const parsed = Object.values(collectionsMap);

      // ATOMOWY ZAPIS: jedno setCatalogs ze wszystkimi zmianami naraz
      setCatalogs(prev => ({
        ...prev,
        [activeCategory]: {
          collections: parsed,
          priceGroups: groups,
          fileName: file.name,
        }
      }));
      setSelectedCollectionName(parsed[0]?.name || '');
      setPositions([]);
    };
    reader.readAsArrayBuffer(file);
  };

  // ---- WCZYTYWANIE ZDJĘĆ ----
  // Normalizacja: usuwa polskie znaki, znaki specjalne, podwójne spacje, lowercase
  const normalizeKey = (name) => {
    return String(name)
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // usuwa diakrytyki (ą→a, ę→e, ó→o itd.)
      .replace(/ł/g, 'l') // ł nie jest objęte NFD
      .replace(/[_\-.,()]/g, ' ') // myślniki/podkreślenia/kropki/przecinki → spacja
      .replace(/\s+/g, ' ') // wielokrotne spacje → jedna
      .trim();
  };

  const handleImagesUpload = (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;

    let processed = 0;
    let added = 0;
    const newMap = { ...images };

    const finish = () => {
      setImages(newMap);
      e.target.value = '';
      if (added === 0) {
        alert(`Wybrano ${files.length} ${files.length === 1 ? 'plik' : 'plików'}, ale żaden nie jest obrazem (JPG/PNG/WEBP). Sprawdź pliki.`);
      } else {
        alert(`Wczytano ${added} ${added === 1 ? 'zdjęcie' : 'zdjęć'}. Kliknij "Zdjęcia" w nagłówku, aby sprawdzić dopasowanie.`);
      }
    };

    files.forEach(file => {
      const ext = file.name.split('.').pop().toLowerCase();
      const isImage = file.type.startsWith('image/') ||
        ['jpg', 'jpeg', 'png', 'webp', 'gif', 'bmp', 'svg'].includes(ext);

      if (!isImage) {
        processed++;
        if (processed === files.length) finish();
        return;
      }

      const reader = new FileReader();
      reader.onload = (ev) => {
        const baseName = file.name.replace(/\.[^/.]+$/, '');
        const key = normalizeKey(baseName);
        newMap[key] = ev.target.result; // data URL (base64)
        added++;
        processed++;
        if (processed === files.length) finish();
      };
      reader.onerror = () => {
        processed++;
        if (processed === files.length) finish();
      };
      reader.readAsDataURL(file);
    });
  };

  const getImage = (elementName) => {
    const key = normalizeKey(elementName);
    return images[key] || null;
  };

  // ---- MODAL ----
  const openAddModal = () => {
    setModalElement('');
    setModalGroup('');
    setModalOpen(true);
  };

  const confirmAdd = () => {
    if (!modalElement || !modalGroup) return;
    const el = selectedCollection.elements.find(e => e.name === modalElement);
    if (!el) return;
    const price = el.prices[modalGroup] || 0;

    setPositions([...positions, {
      id: Date.now() + Math.random(),
      collection: selectedCollection.name,
      elementName: el.name,
      group: modalGroup,
      price,
      qty: 1,
      fabric: { supplier: '', collection: '', color: '', manualMode: false },
    }]);
    setModalOpen(false);
  };

  // ---- ZMIANA GRUPY W POZYCJI (bez usuwania) ----
  const changePositionGroup = (id, newGroup) => {
    setPositions(positions.map(p => {
      if (p.id !== id) return p;
      const col = collections.find(c => c.name === p.collection);
      const el = col?.elements.find(e => e.name === p.elementName);
      const newPrice = el?.prices[newGroup] || 0;
      return { ...p, group: newGroup, price: newPrice };
    }));
  };

  const updateQty = (id, newQty) => {
    if (newQty < 1) return;
    setPositions(positions.map(p => p.id === id ? { ...p, qty: newQty } : p));
  };

  const removePosition = (id) => setPositions(positions.filter(p => p.id !== id));

  // Zmiana tkaniny dla pozycji
  // key: 'supplier', 'collection', 'color', 'manualMode'
  const updatePositionFabric = (id, key, value) => {
    setPositions(positions.map(p => {
      if (p.id !== id) return p;
      const newFabric = { ...(p.fabric || { supplier: '', collection: '', color: '', manualMode: false }), [key]: value };
      // Jeśli zmieniono dostawcę z listy - zresetuj kolekcję (bo nowy dostawca ma inne kolekcje)
      if (key === 'supplier' && !newFabric.manualMode) {
        newFabric.collection = '';
      }
      // Przełączenie na tryb ręczny - wyczyść wszystko
      if (key === 'manualMode' && value === true) {
        newFabric.supplier = '';
        newFabric.collection = '';
      }
      return { ...p, fabric: newFabric };
    }));
  };
  const clearAll = () => {
    setPositions([]);
    setOrderNotes('');
    setOrderPhotos([]);
  };

  // ---- ZDJĘCIA DO ZAMÓWIENIA ----
  const handleOrderPhotoUpload = (e) => {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;

    let processed = 0;
    const newPhotos = [];

    files.forEach(file => {
      if (!file.type.startsWith('image/')) {
        processed++;
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => {
        newPhotos.push({
          id: Date.now() + Math.random(),
          dataUrl: ev.target.result,
          label: '',
        });
        processed++;
        if (processed === files.length) {
          setOrderPhotos(prev => [...prev, ...newPhotos]);
        }
      };
      reader.onerror = () => {
        processed++;
        if (processed === files.length && newPhotos.length > 0) {
          setOrderPhotos(prev => [...prev, ...newPhotos]);
        }
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const removeOrderPhoto = (id) => {
    setOrderPhotos(orderPhotos.filter(p => p.id !== id));
  };

  const updateOrderPhotoLabel = (id, label) => {
    setOrderPhotos(orderPhotos.map(p => p.id === id ? { ...p, label } : p));
  };

  // ---- GENEROWANIE PDF (przez okno wydruku przeglądarki) ----
  const generatePdfHtml = () => {
    const dateStr = new Date().toLocaleDateString('pl-PL', { day: '2-digit', month: 'long', year: 'numeric' });

    const positionRows = positions.map((pos, idx) => {
      const img = getImage(pos.elementName);
      // Format tkaniny: "Dostawca / Kolekcja / Kolor"

      const fabricParts = [f.supplier, f.collection, f.color].filter(Boolean);
      const fabricText = fabricParts.join(' / ');
      return `
        <tr>
          <td style="text-align:center;font-weight:600;color:#92400e;">${idx + 1}</td>
          <td style="text-align:center;">
            ${img ? `<img src="${img}" style="width:60px;height:60px;object-fit:contain;" />` : ''}
          </td>
          <td>
            <div style="font-weight:600;">${pos.elementName}</div>
            <div style="font-size:11px;color:#857461;text-transform:uppercase;letter-spacing:1px;">${pos.collection}</div>
            ${fabricText ? `<div style="font-size:11px;color:#a16207;margin-top:3px;">🧵 ${fabricText}</div>` : ''}
          </td>
          <td style="text-align:center;">${pos.group}</td>
          <td style="text-align:center;">${pos.qty}</td>
          <td style="text-align:right;">${fmt(pos.price)}</td>
          <td style="text-align:right;font-weight:600;">${fmt(pos.price * pos.qty)}</td>
        </tr>
      `;
    }).join('');

    // Sanityzuj numer wyceny dla nazwy pliku (zamień / na -)
    const safeQuoteNumber = String(quoteNumber || 'wycena').replace(/[\/\\:*?"<>|]/g, '-');
    const safeClientName = clientName ? '-' + clientName.replace(/[\/\\:*?"<>|]/g, '-').replace(/\s+/g, '_').slice(0, 30) : '';
    const pdfFilename = `${safeQuoteNumber}${safeClientName}`;

    return `
<!DOCTYPE html>

<head>

  thead { background: #fef3e2; color: #3d342a; }
  th { padding: 10px 8px; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; font-weight: 600; text-align: left; }
  th:first-child, th:nth-child(2), th:nth-child(4), th:nth-child(5) { text-align: center; }
  th:nth-child(6), th:nth-child(7) { text-align: right; }
  td { padding: 10px 8px; border-bottom: 1px solid #e8ddd0; vertical-align: middle; }
  .summary { margin: 30px 30px 0 30px; background: #faf6ef; border: 1px solid #e8ddd0; padding: 18px 22px; }
  .summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
  .summary-row.discount { color: #a16207; }
  .summary-row.total { border-top: 2px solid #3d342a; margin-top: 8px; padding-top: 14px; font-size: 22px; font-weight: 400; }
  .summary-row.total .label { font-size: 10px; letter-spacing: 0.3em; color: #857461; text-transform: uppercase; align-self: center; }
  .notes { margin: 24px 30px; padding: 14px 18px; background: #f8f2e8; border-left: 4px solid #a16207; font-size: 12px; color: #5c5043; }
  .order-photos { margin: 24px 30px; }
  .order-photos-title { font-size: 10px; letter-spacing: 0.3em; color: #857461; text-transform: uppercase; margin-bottom: 10px; }
  .order-photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .order-photo { border: 1px solid #e8ddd0; padding: 6px; background: #faf6ef; }
  .order-photo img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .order-photo-label { font-size: 10px; color: #5c5043; margin-top: 4px; text-align: center; }
  .footer { margin: 40px 30px 0 30px; padding-top: 16px; border-top: 1px solid #e8ddd0; font-size: 11px; color: #857461; text-align: center; }
</style>
</head>
<body>
  <div class="header">
    <div class="label">SHOWROOM · WYCENA</div>
    <h1>Wycena mebli modułowych</h1>
    <div class="num">Nr ${quoteNumber} · ${dateStr}${currentUser ? ` · Przyjął: ${currentUser.username}` : ''} · Status: ${currentStatus}</div>
  </div>

  <div class="meta-row">
    <div class="meta-block">
      <div class="label">Klient</div>
      <div class="val">${clientName || '—'}</div>
    </div>
    <div class="meta-block">
      <div class="label">Telefon</div>
      <div class="val">${clientPhone || '—'}</div>
    </div>
    <div class="meta-block">
      <div class="label">E-mail</div>
      <div class="val">${clientEmail || '—'}</div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Lp.</th>
        <th>Foto</th>
        <th>Element / Kolekcja</th>
        <th>Grupa</th>
        <th>Ilość</th>
        <th>Cena jedn.</th>
        <th>Wartość</th>
      </tr>
    </thead>
    <tbody>${positionRows}</tbody>
  </table>

  <div class="summary">
    <div class="summary-row">
      <span>Suma częściowa</span>
      <span>${fmt(subtotal)}</span>
    </div>
    ${discount > 0 ? `
      <div class="summary-row discount">
        <span>Rabat ${discount}%</span>
        <span>− ${fmt(discountValue)}</span>
      </div>
    ` : ''}
    <div class="summary-row total">
      <span class="label">Do zapłaty</span>
      <span>${fmt(total)}</span>
    </div>
  </div>

  ${orderNotes ? `<div class="notes"><strong>Uwagi do zamówienia:</strong> ${orderNotes}</div>` : ''}

  ${orderPhotos.length > 0 ? `
    <div class="order-photos">
      <div class="order-photos-title">Zdjęcia do zamówienia</div>
      <div class="order-photos-grid">
        ${orderPhotos.map(p => `
          <div class="order-photo">
            <img src="${p.dataUrl}" />
            ${p.label ? `<div class="order-photo-label">${p.label}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  ` : ''}

  <div class="footer">
    Wycena wygenerowana automatycznie · ważna 14 dni od daty wystawienia
  </div>
</body>
</html>
    `;
  };

  // Pomocnicza: czeka aż wszystkie obrazki w dokumencie iframe się załadują
  const waitForImagesToLoad = (doc) => {
    return new Promise((resolve) => {
      const images = doc.images;
      if (!images || images.length === 0) {
        resolve();
        return;
      }
      let loaded = 0;
      const total = images.length;
      const checkDone = () => {
        loaded++;
        if (loaded >= total) resolve();
      };
      for (let i = 0; i < total; i++) {
        const img = images[i];
        if (img.complete && img.naturalHeight !== 0) {
          checkDone();
        } else {
          img.onload = checkDone;
          img.onerror = checkDone; // też kontynuujemy nawet jeśli obraz się nie załaduje
        }
      }
      // Awaryjny timeout - max 5 sekund na obrazki
      setTimeout(resolve, 5000);
    });
  };

  const handleSavePdf = () => {
    if (positions.length === 0) {
      alert('Brak pozycji w wycenie. Dodaj najpierw pozycje.');
      return;
    }
    const html = generatePdfHtml();

    // Usuń stary iframe jeśli istnieje
    const oldIframe = document.getElementById('pdf-print-iframe');
    if (oldIframe) oldIframe.remove();

    // Utwórz ukryty iframe do druku
    const iframe = document.createElement('iframe');
    iframe.id = 'pdf-print-iframe';
    iframe.style.position = 'fixed';
    iframe.style.right = '0';
    iframe.style.bottom = '0';
    iframe.style.width = '0';
    iframe.style.height = '0';
    iframe.style.border = '0';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    // Poczekaj aż wszystkie obrazki się załadują, potem drukuj
    iframe.onload = async () => {
      await waitForImagesToLoad(doc);
      // Dodatkowy bufor na renderowanie
      setTimeout(() => {
        try {
          // Zmień tytuł głównego dokumentu - przeglądarki używają go jako sugerowanej nazwy pliku PDF
          const safeQuoteNumber = String(quoteNumber || 'wycena').replace(/[\/\\:*?"<>|]/g, '-');
          const safeClientName = clientName ? '-' + clientName.replace(/[\/\\:*?"<>|]/g, '-').replace(/\s+/g, '_').slice(0, 30) : '';
          const originalTitle = document.title;
          document.title = `${safeQuoteNumber}${safeClientName}`;

          iframe.contentWindow.focus();
          iframe.contentWindow.print();

          // Przywróć oryginalny tytuł po krótkiej chwili (po otwarciu okna wydruku)
          setTimeout(() => { document.title = originalTitle; }, 1000);
        } catch (e) {
          alert('Nie udało się otworzyć okna wydruku. Spróbuj ponownie.');
        }
      }, 300);
    };
  };

  // Podgląd HTML w nakładce
  const [htmlPreviewOpen, setHtmlPreviewOpen] = useState(false);
  const [htmlPreviewContent, setHtmlPreviewContent] = useState('');

  const handlePreviewHtml = () => {
    if (positions.length === 0) {
      alert('Brak pozycji w wycenie. Dodaj najpierw pozycje.');
      return;
    }
    setHtmlPreviewContent(generatePdfHtml());
    setHtmlPreviewOpen(true);
  };

  const handleSendMail = () => {
    if (positions.length === 0) {
      alert('Brak pozycji w wycenie. Dodaj najpierw pozycje.');
      return;
    }

    // Przygotuj treść maila
    const dateStr = new Date().toLocaleDateString('pl-PL');
    let body = `Wycena nr ${quoteNumber}\n`;
    body += `Data: ${dateStr}\n`;
    if (currentUser) body += `Przyjął: ${currentUser.username}\n`;
    body += `Status: ${currentStatus}\n`;
    body += `\n`;
    if (clientName) body += `Klient: ${clientName}\n`;
    if (clientPhone) body += `Telefon: ${clientPhone}\n`;
    if (clientEmail) body += `E-mail: ${clientEmail}\n`;
    body += `\n--- POZYCJE ---\n\n`;

    positions.forEach((pos, idx) => {
      body += `${idx + 1}. ${pos.elementName} (${pos.collection})\n`;
      body += `   Grupa: ${pos.group} · Ilość: ${pos.qty} · ${fmt(pos.price)} = ${fmt(pos.price * pos.qty)}\n`;
      const f = pos.fabric || {};
      const fabricParts = [f.supplier, f.collection, f.color].filter(Boolean);
      const fabricText = fabricParts.join(' / ');
      if (fabricText) body += `   Tkanina: ${fabricText}\n`;
      body += `\n`;
    });

    body += `--- PODSUMOWANIE ---\n`;
    body += `Suma częściowa: ${fmt(subtotal)}\n`;
    if (discount > 0) body += `Rabat ${discount}%: − ${fmt(discountValue)}\n`;
    body += `DO ZAPŁATY: ${fmt(total)}\n`;
    if (orderNotes) body += `\nUwagi do zamówienia: ${orderNotes}\n`;
    if (orderPhotos.length > 0) {
      body += `\nDołączono ${orderPhotos.length} ${orderPhotos.length === 1 ? 'zdjęcie' : 'zdjęć'} do zamówienia (w załączonym PDF).`;
      const labeled = orderPhotos.filter(p => p.label).map(p => `- ${p.label}`).join('\n');
      if (labeled) body += `\nOpisy zdjęć:\n${labeled}\n`;
    }
    body += `\n\nUWAGA: Pamiętaj o załączeniu pobranego pliku PDF do tego maila.`;

    const subject = `Wycena ${quoteNumber}${clientName ? ' — ' + clientName : ''}`;
    const mailto = `mailto:info@beatris.eu?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    // KROK 1: Pokaż instrukcję
    const ok = confirm(
      `WYSYŁANIE WYCENY MAILEM — 2 KROKI:\n\n` +
      `KROK 1: Po kliknięciu OK otworzy się okno wydruku PDF.\n` +
      `   → Wybierz "Zapisz jako PDF" lub "Microsoft Print to PDF"\n` +
      `   → Zapisz plik (np. na Pulpicie)\n\n` +
      `KROK 2: Po zamknięciu okna wydruku otworzy się aplikacja mailowa.\n` +
      `   → Załącz zapisany plik PDF do maila\n` +
      `   → Kliknij "Wyślij"\n\n` +
      `Kontynuować?`
    );
    if (!ok) return;

    // KROK 2: Generuj PDF (otwórz okno wydruku)
    const html = generatePdfHtml();
    const oldIframe = document.getElementById('pdf-print-iframe');
    if (oldIframe) oldIframe.remove();

    const iframe = document.createElement('iframe');
    iframe.id = 'pdf-print-iframe';
    iframe.style.position = 'fixed';
    iframe.style.right = '0';
    iframe.style.bottom = '0';
    iframe.style.width = '0';
    iframe.style.height = '0';
    iframe.style.border = '0';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();

    iframe.onload = async () => {
      await waitForImagesToLoad(doc);
      setTimeout(() => {
        try {
          // Zmień tytuł głównego dokumentu - przeglądarki używają go jako sugerowanej nazwy pliku PDF
          const safeQuoteNumber = String(quoteNumber || 'wycena').replace(/[\/\\:*?"<>|]/g, '-');
          const safeClientName = clientName ? '-' + clientName.replace(/[\/\\:*?"<>|]/g, '-').replace(/\s+/g, '_').slice(0, 30) : '';
          const originalTitle = document.title;
          document.title = `${safeQuoteNumber}${safeClientName}`;

          iframe.contentWindow.focus();
          iframe.contentWindow.print();

          // Przywróć tytuł
          setTimeout(() => { document.title = originalTitle; }, 1000);

          // KROK 3: Po wydruku - otwórz klient pocztowy
          // Czekamy ~2 sekundy żeby okno wydruku zdążyło się pojawić
          setTimeout(() => {
            window.location.href = mailto;
          }, 2000);
        } catch (e) {
          // Jeśli druk nie poszedł, i tak otwórz mail
          window.location.href = mailto;
        }
      }, 300);
    };
  };

  // ---- PODSUMOWANIE ----
  const subtotal = useMemo(() => positions.reduce((s, p) => s + p.price * p.qty, 0), [positions]);
  const discountValue = subtotal * (discount / 100);
  const total = subtotal - discountValue;
  const fmt = (n) => `${n.toFixed(2).replace('.', ',')} ${currency}`;

  // ---- WIDOK STARTOWY ----
  // Ekran ładowania zanim wczytamy zapisane dane z IndexedDB
  if (isLoading) {
    return (
      <div className="min-h-screen bg-orange-50 flex items-center justify-center" style={{ fontFamily: "'Cormorant Garamond', Georgia, serif" }}>
        <div className="text-center">
          <div className="inline-block w-12 h-12 border-4 border-stone-300 border-t-yellow-800 rounded-full animate-spin mb-4"></div>
          <div className="text-stone-700 tracking-wider uppercase text-sm">Wczytywanie aplikacji...</div>
        </div>
      </div>
    );
  }

  // === EKRAN LOGOWANIA ===
  if (!currentUser) {
    return (
      <div className="min-h-screen bg-orange-50 flex items-center justify-center p-6" style={{ fontFamily: "'Cormorant Garamond', Georgia, serif" }}>
        <div className="max-w-md w-full bg-white shadow-2xl border border-stone-300">
          <div className="bg-orange-100 text-stone-800 px-10 py-8 border-b-4 border-yellow-800 text-center">
            <div className="text-xs tracking-[0.4em] text-yellow-700 mb-2">SHOWROOM · WYCENY</div>
            <h1 className="text-4xl font-light tracking-tight">Logowanie</h1>
            <div className="text-stone-500 mt-2 italic text-sm">Konfigurator mebli modułowych</div>
          </div>

          <div className="p-8 space-y-4">
            <div>
              <label className="block text-[10px] tracking-wider uppercase text-stone-500 mb-1">Użytkownik</label>
              <div className="relative">
                <select
                  value={loginUsername}
                  onChange={e => { setLoginUsername(e.target.value); setLoginError(''); }}
                  className="w-full bg-stone-50 border-2 border-stone-300 px-4 py-3 text-base appearance-none focus:outline-none focus:border-yellow-800 cursor-pointer pr-10"
                  style={{ fontFamily: "'Cormorant Garamond', Georgia, serif" }}
                >
                  <option value="">— wybierz użytkownika —</option>
                  {users.map(u => (
                    <option key={u.username} value={u.username}>
                      {u.username}{u.isAdmin ? ' ★' : ''}
                    </option>
                  ))}
                </select>
                <ChevronDown size={18} className="absolute right-3 top-1/2 -translate-y-1/2 text-stone-500 pointer-events-none" />
              </div>
            </div>

            <div>
              <label className="block text-[10px] tracking-wider uppercase text-stone-500 mb-1">Hasło</label>
              <input
                type="password"
                value={loginPassword}
                onChange={e => { setLoginPassword(e.target.value); setLoginError(''); }}
                onKeyDown={e => e.key === 'Enter' && handleLogin()}
                placeholder="Wpisz hasło"
                className="w-full bg-stone-50 border-2 border-stone-300 px-4 py-3 text-base focus:outline-none focus:border-yellow-800"
                autoFocus
              />
            </div>

            {loginError && (
              <div className="bg-red-50 border border-red-300 text-red-700 px-4 py-2 text-sm">
                {loginError}
              </div>
            )}

            <button
              onClick={handleLogin}
              className="w-full bg-yellow-800 hover:bg-yellow-900 text-white px-6 py-4 text-base tracking-wider uppercase transition-colors"
            >
              Zaloguj się
            </button>

            <div className="text-center text-[10px] text-stone-400 tracking-wider uppercase pt-4 border-t border-stone-200">
              Zarejestrowanych użytkowników: {users.length}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (collections.length === 0 && activeScreen === 'quote') {
    return (
      <div className="min-h-screen bg-orange-50 flex flex-col items-center justify-center p-6" style={{ fontFamily: "'Cormorant Garamond', Georgia, serif" }}>
        <div className="max-w-md w-full bg-white shadow-2xl border border-stone-300 p-8 text-center">
          <div className="text-5xl mb-4">⚠</div>
          <h2 className="text-2xl font-light text-stone-800 mb-2">Brak cennika</h2>
          <div className="text-stone-500 mb-6">
            Dla kategorii <strong>{CATEGORIES.find(c => c.id === activeCategory)?.label}</strong> nie ma jeszcze wgranego cennika.
          </div>
          <button
            onClick={() => setActiveScreen('menu')}
            className="bg-yellow-800 hover:bg-yellow-900 text-white px-6 py-3 text-sm tracking-wider uppercase"
          >
            ← Powrót do menu
          </button>
        </div>
      </div>
    );
  }

  // ---- GŁÓWNY WIDOK ----
  // Jeśli jesteśmy w widoku menu, renderujemy menu zamiast widoku wyceny.
  // Modale (historia, użytkownicy, zdjęcia, cenniki) są wspólne dla obu widoków.

  const enterQuoteForCategory = (catId) => {
    setActiveCategory(catId);
    resetCurrentQuote(true);
    setActiveScreen('quote');
  };

  // Widok menu głównego
  const menuView = (
    <div className="min-h-screen bg-orange-50 p-6 overflow-y-auto" style={{ fontFamily: "'Cormorant Garamond', Georgia, serif" }}>
      {/* NAGŁÓWEK Z UŻYTKOWNIKIEM */}
      <div className="max-w-5xl mx-auto mb-8">
        <div className="flex items-center justify-between bg-orange-100 px-6 py-4 border-b-4 border-yellow-800 shadow">
          <div>
            <div className="text-[10px] tracking-[0.4em] text-yellow-700">SHOWROOM · BEATRIS</div>
            <h1 className="text-3xl font-light tracking-tight text-stone-800">Menu główne</h1>
          </div>
          <div className="flex items-center gap-2">
            <div className="bg-yellow-800 text-white px-3 py-2 text-xs tracking-wider uppercase flex items-center gap-2 shadow">
              <User size={14} />
              <div className="flex flex-col leading-tight">
                <span className="text-[8px] opacity-80">Zalogowany</span>
                <span className="font-bold text-sm">
                  {currentUser?.username}
                  {currentUser?.isAdmin && <span className="text-yellow-200 ml-1">★</span>}
                </span>
              </div>
            </div>
            <button
              onClick={handleLogout}
              className="bg-orange-50 hover:bg-red-600 hover:text-white text-stone-700 border border-stone-300 hover:border-red-600 px-3 py-2 text-[10px] tracking-wider uppercase"
            >
              Wyloguj
            </button>
          </div>
        </div>
      </div>

      {/* SEKCJA: WYCENA */}
      <div className="max-w-5xl mx-auto mb-8">
        <div className="text-[10px] tracking-[0.3em] text-yellow-700 uppercase mb-3 px-2">Nowa wycena</div>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          {CATEGORIES.map(cat => {
            const hasData = catalogs[cat.id]?.collections.length > 0;
            return (
              <button
                key={cat.id}
                onClick={() => {
                  if (!hasData) {
                    alert(`Najpierw wgraj cennik dla kategorii "${cat.label}" w sekcji "Cenniki" poniżej.`);
                    return;
                  }
                  enterQuoteForCategory(cat.id);
                }}
                className={`bg-white border-2 ${hasData ? 'border-yellow-800 hover:bg-yellow-800 hover:text-white' : 'border-stone-300 opacity-60'} shadow-md hover:shadow-xl transition-all p-6 text-left group`}
              >
                <div className="text-3xl mb-2">{cat.id === 'indywidualni' ? '🛋️' : cat.id === 'b2b_pln' ? '🏢' : '🌍'}</div>
                <div className="text-[10px] tracking-[0.3em] uppercase opacity-70 mb-1">Wycena</div>
                <div className="text-xl font-medium">{cat.label}</div>
                <div className="text-[11px] mt-2 opacity-70">
                  {hasData ? `${catalogs[cat.id].collections.length} kolekcji · waluta ${cat.currency}` : `⚠ Brak cennika`}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* SEKCJA: NARZĘDZIA */}
      <div className="max-w-5xl mx-auto mb-8">
        <div className="text-[10px] tracking-[0.3em] text-yellow-700 uppercase mb-3 px-2">Narzędzia</div>
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
          <button
            onClick={() => setHistoryPanelOpen(true)}
            className="bg-white border border-stone-300 hover:border-yellow-800 hover:bg-orange-100 shadow-md hover:shadow-xl transition-all p-4 text-left"
          >
            <div className="text-2xl mb-2">📋</div>
            <div className="text-[10px] tracking-[0.3em] uppercase opacity-70 mb-1">Przeglądaj</div>
            <div className="text-base font-medium text-stone-800">Historia ofert</div>
            <div className="text-[11px] text-stone-500 mt-1">{savedQuotes.length} {savedQuotes.length === 1 ? 'wycena' : 'wycen'}</div>
          </button>

          <button
            onClick={() => setExcelManagerOpen(true)}
            className="bg-white border border-stone-300 hover:border-yellow-800 hover:bg-orange-100 shadow-md hover:shadow-xl transition-all p-4 text-left"
          >
            <div className="text-2xl mb-2">📊</div>
            <div className="text-[10px] tracking-[0.3em] uppercase opacity-70 mb-1">Konfiguracja</div>
            <div className="text-base font-medium text-stone-800">Cenniki</div>
            <div className="text-[11px] text-stone-500 mt-1">
              {CATEGORIES.filter(c => catalogs[c.id]?.collections.length > 0).length}/{CATEGORIES.length} wgranych
            </div>
          </button>

          <button
            onClick={() => setImageDebugOpen(true)}
            className="bg-white border border-stone-300 hover:border-yellow-800 hover:bg-orange-100 shadow-md hover:shadow-xl transition-all p-4 text-left"
          >
            <div className="text-2xl mb-2">🖼️</div>
            <div className="text-[10px] tracking-[0.3em] uppercase opacity-70 mb-1">Konfiguracja</div>
            <div className="text-base font-medium text-stone-800">Zdjęcia</div>
            <div className="text-[11px] text-stone-500 mt-1">{Object.keys(images).length} wgranych</div>
          </button>

          <button
            onClick={() => setFabricsManagerOpen(true)}
            className="bg-white border border-stone-300 hover:border-yellow-800 hover:bg-orange-100 shadow-md hover:shadow-xl transition-all p-4 text-left"
          >
            <div className="text-2xl mb-2">🧵</div>
            <div className="text-[10px] tracking-[0.3em] uppercase opacity-70 mb-1">Konfiguracja</div>
            <div className="text-base font-medium text-stone-800">Tkaniny</div>
            <div className="text-[11px] text-stone-500 mt-1">
              {Object.keys(fabrics).length > 0
                ? `${Object.keys(fabrics).length} dostawców`
                : 'Brak katalogu'}
            </div>
          </button>

          {currentUser?.isAdmin && (
            <button
              onClick={() => setUsersPanelOpen(true)}
              className="bg-white border border-stone-300 hover:border-yellow-800 hover:bg-orange-100 shadow-md hover:shadow-xl transition-all p-4 text-left"
            >
              <div className="text-2xl mb-2">👥</div>

                  const thisYear = now.getFullYear();
                  const monthQuotes = savedQuotes.filter(q => {
                    const d = new Date(q.savedAt);
                    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
                  });
                  const yearQuotes = savedQuotes.filter(q => {
                    const d = new Date(q.savedAt);
                    return d.getFullYear() === thisYear;
                  });
                  // Suma per waluta (bo mamy PLN i EUR)
                  const sumByCurrency = (quotes) => {
                    const sums = {};
                    quotes.forEach(q => {
                      const c = q.currency || '€';
                      sums[c] = (sums[c] || 0) + (q.total || 0);
                    });
                    return sums;
                  };
                  const monthSums = sumByCurrency(monthQuotes);
                  const yearSums = sumByCurrency(yearQuotes);
                  const fmtNum = (n) => n.toFixed(2).replace('.', ',');
                  const monthName = now.toLocaleString('pl-PL', { month: 'long' });

                  return (
                    <div className="bg-orange-100 border-b border-stone-200 px-4 py-2 grid grid-cols-2 sm:grid-cols-4 gap-3 text-[11px]">
                      <div>
                        <div className="text-stone-500 tracking-wider uppercase text-[9px]">Ten miesiąc ({monthName})</div>
                        <div className="text-stone-800 font-bold">{monthQuotes.length} ofert</div>
                        <div className="text-yellow-800 font-medium">
                          {Object.entries(monthSums).map(([c, s]) => `${fmtNum(s)} ${c}`).join(' · ') || '—'}
                        </div>
                      </div>
                      <div>
                        <div className="text-stone-500 tracking-wider uppercase text-[9px]">Ten rok ({thisYear})</div>
                        <div className="text-stone-800 font-bold">{yearQuotes.length} ofert</div>
                        <div className="text-yellow-800 font-medium">
                          {Object.entries(yearSums).map(([c, s]) => `${fmtNum(s)} ${c}`).join(' · ') || '—'}
                        </div>
                      </div>
                      <div>
                        <div className="text-stone-500 tracking-wider uppercase text-[9px]">W produkcji</div>
                        <div className="text-stone-800 font-bold">
                          {savedQuotes.filter(q => (q.status || 'UTWORZONA') === 'PRODUKCJA').length}
                        </div>
                      </div>
                      <div>
                        <div className="text-stone-500 tracking-wider uppercase text-[9px]">Zrealizowane (rok)</div>
                        <div className="text-stone-800 font-bold">
                          {yearQuotes.filter(q => q.status === 'ZREALIZOWANA').length}
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* FILTR PO STATUSIE */}
                <div className="bg-stone-50 border-b border-stone-200 px-4 py-2 flex items-center gap-2 flex-wrap">
                <span className="text-[10px] tracking-wider uppercase text-stone-500">Filtr:</span>
                <button
                  onClick={() => setHistoryStatusFilter('WSZYSTKIE')}
                  className={`px-3 py-1 text-[10px] tracking-wider uppercase font-bold ${
                    historyStatusFilter === 'WSZYSTKIE' ? 'bg-stone-800 text-white' : 'bg-stone-200 text-stone-600 hover:bg-stone-300'
                  }`}
                >
                  Wszystkie ({savedQuotes.length})
                </button>
                {STATUSES.map(s => {
                  const count = savedQuotes.filter(q => (q.status || 'UTWORZONA') === s.id).length;
                  if (count === 0) return null;
                  const active = historyStatusFilter === s.id;
                  return (
                    <button
                      key={s.id}
                      onClick={() => setHistoryStatusFilter(s.id)}
                      className={`px-3 py-1 text-[10px] tracking-wider uppercase font-bold ${
                        active ? `${s.bg} ${s.text}` : 'bg-stone-200 text-stone-600 hover:bg-stone-300'
                      }`}
                    >
                      {s.label} ({count})
                    </button>
                  );
                })}
                </div>
              </>
            )}

            <div className="flex-1 overflow-y-auto p-4">
              {(() => {
                let visible = historyStatusFilter === 'WSZYSTKIE'
                  ? savedQuotes
                  : savedQuotes.filter(q => (q.status || 'UTWORZONA') === historyStatusFilter);

                // Wyszukiwanie po kliencie, numerze, dacie, autorze
                if (historySearch.trim()) {
                  const q = historySearch.toLowerCase().trim();
                  visible = visible.filter(item => {
                    const date = new Date(item.savedAt);
                    const dateStr = date.toLocaleString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    const haystack = [
                      item.clientName,
                      item.clientPhone,
                      item.clientEmail,
                      item.quoteNumber,
                      item.createdBy,
                      item.categoryLabel,
                      item.status,
                      item.orderNotes,
                      dateStr,
                    ].filter(Boolean).join(' ').toLowerCase();
                    return haystack.includes(q);
                  });
                }

                if (savedQuotes.length === 0) {
                  return (
                    <div className="text-center py-16 text-stone-500 italic">
                      Brak zapisanych wycen.<br/>
                      Kliknij "💾 Zapisz wycenę" w nagłówku, aby zapisać aktualną wycenę.
                    </div>
                  );
                }
                if (visible.length === 0) {
                  return (
                    <div className="text-center py-16 text-stone-500 italic">
                      Brak wycen pasujących do {historySearch ? `wyszukania "${historySearch}"` : `statusu "${historyStatusFilter}"`}.
                    </div>
                  );
                }
                return (
                <div className="space-y-2">
                  {visible.map(q => {
                    const date = new Date(q.savedAt);
                    const dateStr = date.toLocaleString('pl-PL', {
                      day: '2-digit', month: '2-digit', year: 'numeric',
                      hour: '2-digit', minute: '2-digit'
                    });
                    const fmtQ = (n) => `${(n || 0).toFixed(2).replace('.', ',')} ${q.currency || ''}`;

                    return (
                      <div key={q.id} className="bg-orange-50 border border-stone-200 p-4 flex items-center gap-4 flex-wrap">
                        <div className="flex-1 min-w-[200px]">
                          <div className="flex items-center gap-2 flex-wrap">
                            <div className="bg-yellow-800 text-white px-2 py-0.5 text-[10px] tracking-wider uppercase">
                              {q.categoryLabel}
                            </div>
                            {/* PLAKIETKA STATUSU + DROPDOWN ZMIANY */}
                            {(() => {
                              const status = q.status || 'UTWORZONA';
                              const st = STATUSES.find(s => s.id === status) || STATUSES[0];
                              return (
                                <div className="relative">
                                  <select
                                    value={status}
                                    onChange={e => changeQuoteStatus(q.id, e.target.value)}
                                    className={`${st.bg} ${st.text} px-2 py-0.5 text-[10px] tracking-wider uppercase font-bold appearance-none cursor-pointer pr-5 border-0 focus:outline-none`}
                                    title="Zmień status"
                                  >
                                    {STATUSES.map(s => (
                                      <option key={s.id} value={s.id} className="bg-white text-stone-800">{s.label}</option>
                                    ))}
                                  </select>
                                  <ChevronDown size={10} className="absolute right-1 top-1/2 -translate-y-1/2 pointer-events-none text-white opacity-80" />
                                </div>
                              );
                            })()}
                            <div className="font-medium text-stone-800">
                              {q.clientName || '(bez klienta)'}
                            </div>
                          </div>
                          <div className="text-[11px] text-stone-500 mt-1">
                            Nr {q.quoteNumber} · {dateStr}
                          </div>
                          {q.createdBy && (
                            <div className="text-[11px] text-yellow-700 font-medium">
                              👤 Przyjął: {q.createdBy}
                            </div>
                          )}
                          {q.clientPhone && (
                            <div className="text-[11px] text-stone-500">📞 {q.clientPhone}</div>
                          )}
                          {q.clientEmail && (
                            <div className="text-[11px] text-stone-500">✉ {q.clientEmail}</div>
                          )}
                        </div>

                        <div className="text-right">
                          <div className="text-[10px] tracking-wider uppercase text-stone-500">
                            {q.positions.length} {q.positions.length === 1 ? 'pozycja' : 'pozycji'}
                          </div>
                          <div className="text-xl font-semibold text-stone-800">{fmtQ(q.total)}</div>
                          {q.discount > 0 && (
                            <div className="text-[10px] text-yellow-700">rabat {q.discount}%</div>
                          )}
                        </div>

                        <div className="flex gap-1">
                          <button
                            onClick={() => loadQuoteFromHistory(q)}
                            className="bg-yellow-800 hover:bg-yellow-900 text-white px-3 py-2 text-[10px] tracking-wider uppercase"
                            title="Wczytaj wycenę"
                          >
                            Wczytaj
                          </button>
                          <button
                            onClick={() => deleteQuoteFromHistory(q.id)}
                            className="bg-stone-100 hover:bg-red-600 hover:text-white text-stone-500 p-2 transition-colors"
                            title="Usuń z historii"
                          >
                            <Trash2 size={14} />
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                );
              })()}
            </div>

            {savedQuotes.length > 0 && (
              <div className="border-t border-stone-200 p-3 bg-stone-50 flex justify-between items-center gap-2 flex-wrap">
                <button
                  onClick={exportHistoryToExcel}
                  className="bg-green-700 hover:bg-green-800 text-white px-4 py-2 text-[10px] tracking-wider uppercase flex items-center gap-1"
                  title="Pobierz historię wycen jako plik Excel"
                >
                  📊 Eksport do Excela ({savedQuotes.length})
                </button>
                <button
                  onClick={() => {
                    if (confirm('Czy na pewno chcesz usunąć WSZYSTKIE zapisane wyceny? Tej akcji nie można cofnąć.')) {
                      setSavedQuotes([]);
                    }
                  }}
                  className="text-[10px] text-stone-500 hover:text-red-700 tracking-wider uppercase"
                >
                  Wyczyść całą historię
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* PODGLĄD HTML WYCENY */}
      {htmlPreviewOpen && (
        <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
          <div className="bg-white max-w-5xl w-full max-h-[95vh] flex flex-col shadow-2xl">
            <div className="bg-orange-100 text-stone-800 px-6 py-4 flex items-center justify-between border-b-4 border-yellow-800 flex-shrink-0">
              <div>
                <div className="text-[10px] tracking-[0.4em] text-yellow-700">PODGLĄD WYCENY</div>
                <div className="text-xl font-light">Nr {quoteNumber}</div>
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={handleSavePdf}
                  className="bg-yellow-800 hover:bg-yellow-900 text-white px-3 py-2 text-xs tracking-wider uppercase flex items-center gap-1"
                >
                  <Download size={12} /> Zapisz PDF
                </button>
                <button onClick={() => setHtmlPreviewOpen(false)} className="text-stone-600 hover:text-yellow-800">
                  <X size={24} />
                </button>
              </div>
            </div>
            <div className="flex-1 overflow-hidden bg-stone-100">
              <iframe
                title="Podgląd wyceny"
                srcDoc={htmlPreviewContent}
                className="w-full h-full border-0 bg-white"
                style={{ minHeight: '70vh' }}
              />
            </div>
          </div>
        </div>
      )}

      {/* PANEL DIAGNOSTYCZNY ZDJĘĆ */}
      {imageDebugOpen && (
        <div
          className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4"
          onClick={() => setImageDebugOpen(false)}
        >
          <div
            className="bg-white max-w-3xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl"
            onClick={e => e.stopPropagation()}
          >
            <div className="bg-orange-100 text-stone-800 px-6 py-5 flex items-center justify-between border-b-4 border-yellow-800">
              <div>
                <div className="text-[10px] tracking-[0.4em] text-yellow-700">DIAGNOSTYKA ZDJĘĆ</div>
                <div className="text-xl font-light">Wczytano {Object.keys(images).length} zdjęć</div>
              </div>
              <button onClick={() => setImageDebugOpen(false)} className="text-stone-500 hover:text-yellow-700">
                <X size={24} />
              </button>
            </div>

            <div className="p-6 overflow-y-auto space-y-5">
              {/* Akcje */}
              <div className="space-y-2">
                <div className="text-[10px] tracking-wider uppercase text-stone-500">Wgraj zdjęcia</div>
                <div className="flex gap-2 flex-wrap">
                  <button
                    onClick={() => imagesInputRef.current?.click()}
                    className="bg-yellow-800 hover:bg-yellow-900 text-white px-4 py-3 text-sm tracking-wider uppercase flex items-center gap-2 flex-1 min-w-[200px] justify-center"
                  >
                    <FolderOpen size={16} />
                    Wybierz pliki (JPG/PNG)
                  </button>
                  <button
                    onClick={() => imagesFolderInputRef.current?.click()}
                    className="bg-orange-50 hover:bg-stone-300 text-white px-4 py-3 text-sm tracking-wider uppercase flex items-center gap-2 flex-1 min-w-[200px] justify-center"
                  >
                    <FolderOpen size={16} />
                    Wybierz cały folder
                  </button>
                </div>
                <div className="text-xs text-stone-500 italic">
                  Na iPadzie/iPhonie zawsze używaj <strong>"Wybierz pliki"</strong>. "Folder" działa tylko w Chrome/Edge na komputerze.
                </div>
                {Object.keys(images).length > 0 && (
                  <button
                    onClick={() => { setImages({}); }}
                    className="bg-orange-100 hover:bg-red-600 hover:text-white text-stone-700 px-4 py-2 text-xs tracking-wider uppercase mt-2"
                  >
                    Wyczyść wszystkie wgrane zdjęcia
                  </button>
                )}
              </div>

              {/* Lista UNIKALNYCH elementów z Excela vs zdjęcia */}
              <div>
                <div className="text-sm font-medium text-stone-800 mb-2">Dopasowanie do elementów z Excela:</div>
                <div className="text-xs text-stone-500 mb-2 italic">
                  Jeden element = jedno zdjęcie. Element występujący w wielu kolekcjach pokazany jest raz.
                </div>
                <div className="border border-stone-200 max-h-96 overflow-y-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-orange-50 text-xs uppercase tracking-wider text-stone-600 sticky top-0">
                      <tr>
                        <th className="text-left py-2 px-3">Element</th>
                        <th className="text-left py-2 px-3">Kolekcje</th>
                        <th className="text-center py-2 px-3">Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {(() => {
                        // Zbieramy unikalne elementy (po znormalizowanej nazwie)
                        // i listujemy w których kolekcjach występują
                        const unique = {};
                        collections.forEach(col => {
                          col.elements.forEach(el => {
                            const key = normalizeKey(el.name);
                            if (!unique[key]) {
                              unique[key] = { name: el.name, collections: [] };
                            }
                            if (!unique[key].collections.includes(col.name)) {
                              unique[key].collections.push(col.name);
                            }
                          });
                        });
                        const list = Object.values(unique).sort((a, b) => a.name.localeCompare(b.name));
                        return list.map((item, i) => {
                          const found = getImage(item.name);
                          return (
                            <tr key={i} className="border-t border-stone-200">
                              <td className="py-2 px-3 text-stone-700 font-medium">{item.name}</td>
                              <td className="py-2 px-3 text-stone-500 text-xs">
                                {item.collections.join(', ')}
                              </td>
                              <td className="py-2 px-3 text-center">
                                {found ? (
                                  <span className="inline-flex items-center gap-1 text-green-700 text-xs">
                                    <Check size={14} /> Znaleziono
                                  </span>
                                ) : (
                                  <span className="text-stone-500 text-xs">Brak zdjęcia</span>
                                )}
                              </td>
                            </tr>
                          );
                        });
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Lista wgranych plików */}
              <div>
                <div className="text-sm font-medium text-stone-800 mb-2">Wgrane pliki (po normalizacji nazw):</div>
                <div className="bg-stone-50 border border-stone-200 p-3 max-h-48 overflow-y-auto">
                  {Object.keys(images).length === 0 ? (
                    <div className="text-stone-500 italic text-sm">Brak wgranych zdjęć</div>
                  ) : (
                    <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs font-mono text-stone-700">
                      {Object.keys(images).sort().map(k => (
                        <div key={k} className="truncate">{k}</div>
                      ))}
                    </div>
                  )}
                </div>
              </div>

              <div className="bg-orange-50 border-l-4 border-yellow-800 p-3 text-sm text-stone-700">
                <strong>Wskazówka:</strong> Nazwa pliku JPG/PNG musi pasować do nazwy elementu z Excela (bez rozszerzenia).
                Aplikacja ignoruje wielkość liter, polskie znaki (ą→a, ł→l), myślniki, kropki i podwójne spacje.
                Np. plik <span className="font-mono bg-white px-1">moduł 1-osobowy.jpg</span> dopasuje się do elementu <span className="font-mono bg-white px-1">Moduł 1-osobowy</span> lub <span className="font-mono bg-white px-1">modul 1 osobowy</span>.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* MODAL DODAWANIA POZYCJI */}
      {modalOpen && selectedCollection && (
        <div
          className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4"
          onClick={() => setModalOpen(false)}
        >
          <div
            className="bg-white max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-2xl"
            onClick={e => e.stopPropagation()}
          >
            {/* Header modal */}
            <div className="bg-orange-100 text-stone-800 px-6 py-5 flex items-center justify-between border-b-4 border-yellow-800">
              <div>
                <div className="text-[10px] tracking-[0.4em] text-yellow-700">NOWA POZYCJA</div>
                <div className="text-xl font-light">Kolekcja: {selectedCollection.name}</div>
              </div>
              <button onClick={() => setModalOpen(false)} className="text-stone-500 hover:text-yellow-700">
                <X size={24} />
              </button>
            </div>

            {/* Treść modalu */}
            <div className="p-6 overflow-y-auto space-y-5">
              {/* Wybór elementu */}
              <div>
                <div className="text-[10px] tracking-wider uppercase text-stone-500 mb-2">Wybierz element</div>
                <div className="grid grid-cols-1 gap-2 max-h-72 overflow-y-auto">
                  {selectedCollection.elements.map(el => {
                    const img = getImage(el.name);
                    const isSelected = modalElement === el.name;
                    return (
                      <button
                        key={el.name}
                        onClick={() => setModalElement(el.name)}
                        className={`flex items-center gap-3 p-3 border-2 text-left transition-all ${
                          isSelected
                            ? 'border-yellow-800 bg-orange-50'
                            : 'border-stone-200 hover:border-stone-400 bg-white'
                        }`}
                      >
                        <div className="w-14 h-14 bg-orange-50 border border-stone-200 flex items-center justify-center flex-shrink-0">
                          {img ? (
                            <img src={img} alt={el.name} className="w-full h-full object-contain p-1" />
                          ) : (
                            <ImageIcon size={20} className="text-stone-500" />
                          )}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-sm font-medium text-stone-800 truncate">{el.name}</div>
                        </div>
                        {isSelected && <Check size={18} className="text-yellow-800 flex-shrink-0" />}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Wybór grupy */}
              {modalElement && (() => {
                const el = selectedCollection.elements.find(e => e.name === modalElement);
                return (
                  <div>
                    <div className="text-[10px] tracking-wider uppercase text-stone-500 mb-2">Wybierz grupę cenową</div>
                    <div className="grid grid-cols-1 gap-2">
                      {priceGroups.map(g => {
                        const price = el?.prices[g] || 0;
                        const disabled = price === 0;
                        const isSelected = modalGroup === g;
                        return (
                          <button
                            key={g}
                            disabled={disabled}
                            onClick={() => setModalGroup(g)}
                            className={`p-4 border-2 transition-all flex items-center justify-between ${
                              disabled
                                ? 'border-stone-200 text-stone-500 cursor-not-allowed bg-stone-50'
                                : isSelected
                                ? 'border-yellow-800 bg-yellow-800 text-white'
                                : 'border-stone-200 hover:border-stone-400 bg-white text-stone-700'
                            }`}
                          >
                            <div className="text-base tracking-wider uppercase font-bold">{g}</div>
                            <div className="text-xl font-light">{disabled ? '—' : fmt(price)}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Footer modal */}
            <div className="border-t border-stone-200 p-4 flex justify-between items-center bg-stone-50">
              <button
                onClick={() => setModalOpen(false)}
                className="px-5 py-3 text-stone-600 hover:text-stone-800 tracking-wider uppercase text-sm"
              >
                Anuluj
              </button>
              <button
                onClick={confirmAdd}
                disabled={!modalElement || !modalGroup}
                className={`px-8 py-3 tracking-wider uppercase text-sm flex items-center gap-2 transition-all ${
                  modalElement && modalGroup
                    ? 'bg-yellow-800 hover:bg-yellow-900 text-white'
                    : 'bg-orange-100 text-stone-500 cursor-not-allowed'
                }`}
              >
                <Plus size={16} />
                Dodaj do wyceny
              </button>
            </div>
          </div>
        </div>
      )}

      {/* PODGLĄD ZDJĘCIA */}
      {previewImage && (
        <div
          className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-8"
          onClick={() => setPreviewImage(null)}
        >
          <button className="absolute top-6 right-6 text-white hover:text-yellow-700">
            <X size={32} />
          </button>
          <img src={previewImage} alt="Podgląd" className="max-w-full max-h-full object-contain" />
        </div>
      )}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ShowroomQuoteApp));
</script>
</body>
</html>
